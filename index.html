<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Estás Invitado! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F2A516;
    --gold-light: #FFD166;
    --pink: #FF6B8A;
    --pink-deep: #E8375A;
    --cream: #FFF8F0;
    --dark: #1A1A2E;
    --purple: #16213E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === CONFETTI CANVAS === */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* === HERO === */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(242,165,22,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,107,138,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(22,33,62,0.8) 0%, transparent 70%),
      var(--dark);
    z-index: 1;
  }

  .sparkle-border {
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    border: 2px solid rgba(242,165,22,0.2);
    border-radius: 30px;
    pointer-events: none;
  }

  .sparkle-border::before,
  .sparkle-border::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 1.2rem;
    animation: sparkle 2s ease-in-out infinite;
  }
  .sparkle-border::before { top: -10px; left: 50%; }
  .sparkle-border::after { bottom: -10px; right: 30%; animation-delay: 1s; }

  @keyframes sparkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .invite-tag {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 8px 24px;
    border-radius: 30px;
    margin-bottom: 2rem;
    animation: fadeDown 1s ease-out;
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(3rem, 10vw, 7rem);
    line-height: 1;
    margin-bottom: 0.5rem;
    animation: fadeUp 1s ease-out 0.2s both;
  }

  .main-title .line1 {
    display: block;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .main-title .line2 {
    display: block;
    font-size: 0.5em;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 300;
    color: rgba(255,248,240,0.7);
    margin-bottom: 3rem;
    animation: fadeUp 1s ease-out 0.4s both;
  }

  /* === COUNTDOWN === */
  .countdown-section {
    animation: fadeUp 1s ease-out 0.6s both;
    margin-bottom: 3rem;
  }

  .countdown-label {
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 1.2rem;
  }

  .countdown {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .countdown-item {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(242,165,22,0.2);
    border-radius: 16px;
    padding: 1.2rem 1.5rem;
    min-width: 90px;
    transition: transform 0.3s, border-color 0.3s;
  }

  .countdown-item:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
  }

  .countdown-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
    display: block;
  }

  .countdown-unit {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,248,240,0.5);
    margin-top: 4px;
  }

  /* === INFO CARDS === */
  .info-section {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
    animation: fadeUp 1s ease-out 0.8s both;
    width: 100%;
    max-width: 500px;
  }

  .info-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 1.2rem 1.8rem;
    width: 100%;
    transition: all 0.3s;
  }

  .info-card:hover {
    background: rgba(255,255,255,0.08);
    border-color: var(--gold);
    transform: translateX(4px);
  }

  .info-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
  }

  .info-text {
    text-align: left;
  }

  .info-text .label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,248,240,0.4);
  }

  .info-text .value {
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--cream);
  }

  /* === MAP BUTTON === */
  .map-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 2rem;
    padding: 16px 36px;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: white;
    text-decoration: none;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    animation: fadeUp 1s ease-out 1s both;
    box-shadow: 0 4px 25px rgba(232,55,90,0.3);
  }

  .map-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 35px rgba(232,55,90,0.5);
  }

  .map-btn svg {
    width: 20px; height: 20px;
    fill: currentColor;
  }

  /* === FLOATING EMOJIS === */
  .floating-emoji {
    position: fixed;
    font-size: 1.5rem;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === FOOTER === */
  .footer-msg {
    margin-top: 2.5rem;
    font-size: 0.85rem;
    color: rgba(255,248,240,0.35);
    animation: fadeUp 1s ease-out 1.2s both;
    font-style: italic;
  }

  /* === PASSED EVENT === */
  .countdown-passed .countdown-number {
    color: var(--pink);
  }

  .passed-msg {
    color: var(--pink);
    font-weight: 600;
    font-size: 1.2rem;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<section class="hero">
  <div class="sparkle-border"></div>

  <div class="invite-tag">✨ Estás invitado ✨</div>

  <h1 class="main-title">
    <span class="line1">¡Fiesta de</span>
    <span class="line2">Cumpleaños!</span>
  </h1>

  <p class="subtitle">Ven a celebrar conmigo este día tan especial</p>

  <!-- COUNTDOWN -->
  <div class="countdown-section">
    <div class="countdown-label">Cuenta regresiva</div>
    <div class="countdown" id="countdown">
      <div class="countdown-item">
        <span class="countdown-number" id="days">00</span>
        <div class="countdown-unit">Días</div>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="hours">00</span>
        <div class="countdown-unit">Horas</div>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="minutes">00</span>
        <div class="countdown-unit">Minutos</div>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="seconds">00</span>
        <div class="countdown-unit">Segundos</div>
      </div>
    </div>
  </div>

  <!-- INFO -->
  <div class="info-section">
    <div class="info-card">
      <span class="info-icon">📅</span>
      <div class="info-text">
        <div class="label">Fecha</div>
        <div class="value">25 de Abril, 2026</div>
      </div>
    </div>
    <div class="info-card">
      <span class="info-icon">🕕</span>
      <div class="info-text">
        <div class="label">Hora</div>
        <div class="value">6:00 PM</div>
      </div>
    </div>
    <div class="info-card">
      <span class="info-icon">📍</span>
      <div class="info-text">
        <div class="label">Ubicación</div>
        <div class="value">Ver dirección en el mapa</div>
      </div>
    </div>
  </div>

  <a href="https://maps.app.goo.gl/cM9nKiaWPqJJbywt7" target="_blank" class="map-btn">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    ¿Cómo llegar?
  </a>

  <p class="footer-msg">¡Te esperamos! No faltes 🎉</p>
</section>

<script>
  // === COUNTDOWN ===
  const targetDate = new Date('2026-04-25T18:00:00-05:00'); // 6PM Lima time

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '🎉';
      document.getElementById('hours').textContent = '🎂';
      document.getElementById('minutes').textContent = '🥳';
      document.getElementById('seconds').textContent = '🎈';
      document.querySelector('.countdown-label').innerHTML = '<span class="passed-msg">¡La fiesta es AHORA!</span>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById('days').textContent = String(days).padStart(2, '0');
    document.getElementById('hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  // === FLOATING EMOJIS ===
  const emojis = ['🎈', '🎂', '🎁', '🎉', '🥳', '🍰', '✨', '🎊', '💫', '🪅'];

  function createFloatingEmoji() {
    const el = document.createElement('div');
    el.classList.add('floating-emoji');
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (8 + Math.random() * 12) + 's';
    el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 20000);
  }

  for (let i = 0; i < 6; i++) {
    setTimeout(createFloatingEmoji, i * 800);
  }
  setInterval(createFloatingEmoji, 2500);

  // === CONFETTI CANVAS ===
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const colors = ['#F2A516', '#FFD166', '#FF6B8A', '#E8375A', '#FFF8F0', '#FFB347'];

  class Particle {
    constructor() {
      this.reset();
      this.y = Math.random() * canvas.height;
    }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = -10;
      this.size = Math.random() * 5 + 2;
      this.speedY = Math.random() * 1 + 0.3;
      this.speedX = Math.random() * 1 - 0.5;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.opacity = Math.random() * 0.5 + 0.2;
      this.rotation = Math.random() * 360;
      this.rotSpeed = Math.random() * 4 - 2;
    }
    update() {
      this.y += this.speedY;
      this.x += this.speedX;
      this.rotation += this.rotSpeed;
      if (this.y > canvas.height + 10) this.reset();
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate((this.rotation * Math.PI) / 180);
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size * 0.6);
      ctx.restore();
    }
  }

  for (let i = 0; i < 60; i++) {
    particles.push(new Particle());
  }

  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animateConfetti);
  }
  animateConfetti();
</script>

</body>
</html>
